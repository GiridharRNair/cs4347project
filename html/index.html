<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SneakerVault — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <div class="header-top">
      <a class="brand" href="index.html">SneakerVault</a>
      <nav>
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="add_sneaker.html">Sneakers</a></li>
          <li><a href="add_inventory.html">Inventory</a></li>
          <li><a href="supplier_management.html">Suppliers</a></li>
          <li><a href="record_sale.html">Record Sale</a></li>
          <li><a href="customer_management.html">Customers</a></li>
          <li><a href="inventory_search.html">Search</a></li>
          <li><a href="reports.html">Reports</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="message"></div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="label">Total Inventory</div>
        <div class="value" id="metricTotalInventory">—</div>
      </div>
      <div class="metric-card" style="border-left-color:#22c55e">
        <div class="label">Available</div>
        <div class="value" id="metricItemsAvailable">—</div>
      </div>
      <div class="metric-card" style="border-left-color:#f59e0b">
        <div class="label">Reserved</div>
        <div class="value" id="metricItemsReserved">—</div>
      </div>
      <div class="metric-card" style="border-left-color:#ef4444">
        <div class="label">Sold</div>
        <div class="value" id="metricItemsSold">—</div>
      </div>
      <div class="metric-card" style="border-left-color:#8b5cf6">
        <div class="label">Cost of Sold Inventory</div>
        <div class="value" id="metricSoldCost">—</div>
      </div>
    </div>

    <div class="card">
      <h3 class="section-heading">Recent Sales</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Item ID</th>
              <th>Brand</th>
              <th>Model</th>
              <th>Customer ID</th>
            </tr>
          </thead>
          <tbody id="recentSalesBody">
            <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:2rem;">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>
