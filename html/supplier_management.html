<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SneakerVault - Supplier Management</title>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <h1>SneakerVault</h1>
    <h2>Supplier Management</h2>
    <nav>
      <a href="index.html">Dashboard</a> |
      <a href="add_sneaker.html">Add Sneaker</a> |
      <a href="add_inventory.html">Add Inventory</a> |
      <a href="supplier_management.html">Supplier Management</a> |
      <a href="record_sale.html">Record Sale</a> |
      <a href="customer_management.html">Customer Management</a> |
      <a href="inventory_search.html">Inventory Search</a> |
      <a href="reports.html">Reports</a>
    </nav>
    <hr />
  </header>

  <main>
    <p id="message"></p>
    <section>
      <h3>Save Supplier</h3>
      <form id="supplierSaveForm" action="#" method="post">
        <label for="supplierId">Supplier ID (optional):</label><br />
        <input type="number" min="1" id="supplierId" name="supplierId" placeholder="Leave blank to auto-generate" /><br /><br />

        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" required /><br /><br />

        <label for="type">Type:</label><br />
        <input type="text" id="type" name="type" required /><br /><br />

        <label for="contactInfo">Contact Info:</label><br />
        <input type="text" id="contactInfo" name="contactInfo" required /><br /><br />

        <button type="submit">Save Supplier</button>
        <button type="reset">Clear</button>
      </form>
    </section>

    <hr />

    <section>
      <h3>Search Suppliers</h3>
      <form id="supplierSearchForm" action="#" method="get">
        <label for="searchName">Name:</label>
        <input type="text" id="searchName" name="searchName" />

        <label for="searchType">Type:</label>
        <input type="text" id="searchType" name="searchType" />

        <button type="submit">Search</button>
      </form>

      <table border="1" cellpadding="8" cellspacing="0">
        <thead>
          <tr>
            <th>Supplier ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Contact Info</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="supplierBody">
          <tr>
            <td colspan="5">Loading...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
