<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SneakerVault — Inventory Search</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <div class="header-top">
      <a class="brand" href="index.html">SneakerVault</a>
      <nav>
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="add_sneaker.html">Sneakers</a></li>
          <li><a href="add_inventory.html">Inventory</a></li>
          <li><a href="supplier_management.html">Suppliers</a></li>
          <li><a href="record_sale.html">Record Sale</a></li>
          <li><a href="customer_management.html">Customers</a></li>
          <li><a href="inventory_search.html">Search</a></li>
          <li><a href="reports.html">Reports</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="message"></div>

    <div class="card">
      <h3 class="section-heading">Search Inventory</h3>
      <form id="inventorySearchForm" class="search-bar">
        <div class="form-group">
          <label for="brand">Brand</label>
          <input type="text" id="brand" name="brand" placeholder="e.g. Nike" />
        </div>
        <div class="form-group">
          <label for="size">Size</label>
          <input type="number" step="0.5" id="size" name="size" placeholder="e.g. 10.5" />
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="">Any</option>
            <option value="Available">Available</option>
            <option value="Reserved">Reserved</option>
            <option value="Sold">Sold</option>
          </select>
        </div>
        <div style="align-self:flex-end;">
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Item ID</th>
              <th>Sneaker</th>
              <th>Size</th>
              <th>Condition</th>
              <th>Price</th>
              <th>Status</th>
              <th>Customer ID</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="inventoryBody">
            <tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:2rem;">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</body>
</html>
